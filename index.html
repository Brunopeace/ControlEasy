<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Parcelas Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            color: #f8fafc;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body class="p-4 sm:p-6 antialiased">

    <div class="max-w-4xl mx-auto">
        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
            <div class="w-full sm:w-auto">
                <div class="flex items-center justify-between sm:justify-start gap-4">
                    <h1 class="text-2xl sm:text-3xl font-bold tracking-tight text-white flex items-center gap-2">
                        <i data-lucide="credit-card" class="text-indigo-400"></i> ControlEasy <span class="text-xs font-normal bg-indigo-500/20 text-indigo-300 px-2.5 py-0.5 rounded-full border border-indigo-500/30">Parcelas</span>
                    </h1>
                    
                    <!-- Botão de Instalação PWA (Invisível por padrão) -->
                    <button id="btn-instalar" class="hidden cursor-pointer bg-gradient-to-r from-indigo-600 to-indigo-500 hover:from-indigo-500 hover:to-indigo-400 text-white text-xs font-bold px-3 py-2 rounded-xl shadow-lg shadow-indigo-600/20 flex items-center gap-1.5 border border-indigo-400/20 transition-all duration-200 animate-bounce">
                        <i data-lucide="download" class="w-3.5 h-3.5"></i> Instalar App
                    </button>
                </div>
                <p class="text-slate-400 text-sm mt-1">Gerencie seus pagamentos de forma simples e segura.</p>
            </div>
            
            <div class="flex gap-3 w-full sm:w-auto">
                <div class="glass-card flex-1 sm:flex-none p-3 rounded-2xl flex items-center gap-3 px-5">
                    <div class="p-2 bg-emerald-500/20 text-emerald-400 rounded-xl">
                        <i data-lucide="check-circle-2"></i>
                    </div>
                    <div>
                        <p class="text-xs text-slate-400">Pagas</p>
                        <p id="total-pagas" class="text-lg font-bold text-emerald-400">0/12</p>
                    </div>
                </div>
                <div class="glass-card flex-1 sm:flex-none p-3 rounded-2xl flex items-center gap-3 px-5">
                    <div class="p-2 bg-amber-500/20 text-amber-400 rounded-xl">
                        <i data-lucide="clock"></i>
                    </div>
                    <div>
                        <p class="text-xs text-slate-400">Restante</p>
                        <p id="valor-restante" class="text-lg font-bold text-amber-400">R$ 0,00</p>
                    </div>
                </div>
            </div>
        </header>

        <div class="glass-card p-4 rounded-2xl mb-6">
            <div class="flex justify-between text-xs text-slate-400 mb-2">
                <span>Progresso de Quitação</span>
                <span id="texto-progresso" class="font-medium text-indigo-300">0%</span>
            </div>
            <div class="w-full bg-slate-800/60 rounded-full h-2.5 overflow-hidden border border-slate-700/50">
                <div id="barra-progresso" class="bg-gradient-to-r from-indigo-500 to-emerald-500 h-2.5 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <div class="space-y-3" id="lista-parcelas"></div>

        <div class="flex justify-end mt-6">
            <button onclick="resetarDados()" class="text-xs text-slate-500 hover:text-rose-400 transition-colors flex items-center gap-1 bg-slate-900/30 px-3 py-1.5 rounded-lg border border-slate-800 hover:border-rose-500/20">
                <i data-lucide="rotate-ccw" class="w-3.5 h-3.5"></i> Reiniciar todas as parcelas
            </button>
        </div>
    </div>

    <!-- ESTRUTURA DO MODAL -->
    <div id="modal-edicao" class="fixed inset-0 bg-slate-950/60 backdrop-blur-sm z-50 flex items-center justify-center hidden p-4">
        <div class="glass-card w-full max-w-md rounded-2xl p-6 shadow-2xl border border-slate-700/60">
            <div class="flex justify-between items-center mb-5">
                <h3 class="text-lg font-bold text-white flex items-center gap-2">
                    <i data-lucide="edit-3" class="text-indigo-400 w-5 h-5"></i> Editar Parcela <span id="modal-titulo-num" class="text-indigo-300">00</span>
                </h3>
                <button onclick="fecharModal()" class="text-slate-400 hover:text-white transition-colors cursor-pointer">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <input type="hidden" id="modal-index">
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">Valor (R$)</label>
                    <input type="number" step="0.01" id="modal-valor" class="w-full bg-slate-900/60 border border-slate-700 rounded-xl px-4 py-2.5 text-white font-medium focus:outline-none focus:border-indigo-500 transition-colors">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">Data de Vencimento</label>
                    <input type="text" id="modal-vencimento" placeholder="DD/MM/AAAA" class="w-full bg-slate-900/60 border border-slate-700 rounded-xl px-4 py-2.5 text-white font-medium focus:outline-none focus:border-indigo-500 transition-colors">
                </div>
            </div>

            <div class="flex gap-3 mt-6">
                <button onclick="fecharModal()" class="flex-1 cursor-pointer bg-slate-800 text-slate-300 hover:bg-slate-700 transition-all rounded-xl py-2.5 text-sm font-semibold">
                    Cancelar
                </button>
                <button onclick="salvarEdicao()" class="flex-1 cursor-pointer bg-indigo-600 hover:bg-indigo-500 transition-all text-white rounded-xl py-2.5 text-sm font-semibold shadow-lg shadow-indigo-600/20">
                    Salvar Alterações
                </button>
            </div>
        </div>
    </div>

    <!-- LOGICA DE REGISTRO E INSTALAÇÃO DO PWA -->
    <script>
        let dispositivoProntoInstalar;
        const botaoInstalar = document.getElementById('btn-instalar');

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registrado com sucesso!', reg.scope))
                    .catch(err => console.log('Falha ao registrar o Service Worker:', err));
            });
        }

        // Detecta se o app cumpre os requisitos e pode ser instalado
        window.addEventListener('beforeinstallprompt', (e) => {
            // Previne o aviso padrão do navegador para usarmos nosso próprio botão
            e.preventDefault();
            dispositivoProntoInstalar = e;
            // Torna o nosso botão customizado visível
            botaoInstalar.classList.remove('hidden');
        });

        // Evento de clique para disparar a instalação do PWA
        botaoInstalar.addEventListener('click', async () => {
            if (!dispositivoProntoInstalar) return;
            
            // Mostra a caixinha nativa de instalação do sistema
            dispositivoProntoInstalar.prompt();
            
            // Aguarda a resposta do usuário
            const { outcome } = await dispositivoProntoInstalar.userChoice;
            console.log(`Resposta do usuário para instalação: ${outcome}`);
            
            // Limpa o evento já que foi utilizado e esconde o botão
            dispositivoProntoInstalar = null;
            botaoInstalar.classList.add('hidden');
        });

        // Esconde o botão se o app já tiver sido instalado com sucesso
        window.addEventListener('appinstalled', () => {
            console.log('ControlEasy instalado com sucesso!');
            botaoInstalar.classList.add('hidden');
        });
    </script>

    <!-- LOGICA DO APLICATIVO -->
    <script>
        const parcelasIniciais = [
            { numero: 1, valor: 359.92, vencimento: "01/07/2026", pago: false, dataPagamento: null },
            { numero: 2, valor: 310.66, vencimento: "01/08/2026", pago: false, dataPagamento: null },
            { numero: 3, valor: 310.66, vencimento: "01/09/2026", pago: false, dataPagamento: null },
            { numero: 4, valor: 310.66, vencimento: "01/10/2026", pago: false, dataPagamento: null },
            { numero: 5, valor: 310.66, vencimento: "01/11/2026", pago: false, dataPagamento: null },
            { numero: 6, valor: 310.66, vencimento: "01/12/2026", pago: false, dataPagamento: null },
            { numero: 7, valor: 310.66, vencimento: "01/01/2027", pago: false, dataPagamento: null },
            { numero: 8, valor: 310.66, vencimento: "01/02/2027", pago: false, dataPagamento: null },
            { numero: 9, valor: 310.66, vencimento: "01/03/2027", pago: false, dataPagamento: null },
            { numero: 10, valor: 310.66, vencimento: "01/04/2027", pago: false, dataPagamento: null },
            { numero: 11, valor: 310.66, vencimento: "01/05/2027", pago: false, dataPagamento: null },
            { numero: 12, valor: 310.76, vencimento: "01/06/2027", pago: false, dataPagamento: null }
        ];

        let parcelas = JSON.parse(localStorage.getItem('app_parcelas')) || parcelasIniciais;

        function salvarNoStorage() {
            localStorage.setItem('app_parcelas', JSON.stringify(parcelas));
        }

        function alternarStatus(numero, event) {
            if (event) event.stopPropagation();
            const index = parcelas.findIndex(p => p.numero === numero);
            if (index !== -1) {
                parcelas[index].pago = !parcelas[index].pago;
                
                if (parcelas[index].pago) {
                    const agora = new Date();
                    const dia = String(agora.getDate()).padStart(2, '0');
                    const mes = String(agora.getMonth() + 1).padStart(2, '0');
                    const ano = agora.getFullYear();
                    const hora = String(agora.getHours()).padStart(2, '0');
                    const minuto = String(agora.getMinutes()).padStart(2, '0');
                    parcelas[index].dataPagamento = `${dia}/${mes}/${ano} ${hora}:${minuto}`;
                } else {
                    parcelas[index].dataPagamento = null;
                }

                salvarNoStorage();
                renderizar();
            }
        }

        function abrirModal(numero) {
            const index = parcelas.findIndex(p => p.numero === numero);
            if (index !== -1) {
                document.getElementById('modal-index').value = index;
                document.getElementById('modal-titulo-num').innerText = numero.toString().padStart(2, '0');
                document.getElementById('modal-valor').value = parcelas[index].valor;
                document.getElementById('modal-vencimento').value = parcelas[index].vencimento;
                document.getElementById('modal-edicao').classList.remove('hidden');
            }
        }

        function fecharModal() {
            document.getElementById('modal-edicao').classList.add('hidden');
        }

        function salvarEdicao() {
            const index = document.getElementById('modal-index').value;
            const novoValor = parseFloat(document.getElementById('modal-valor').value);
            const novoVencimento = document.getElementById('modal-vencimento').value.trim();

            if (isNaN(novoValor) || novoValor <= 0 || novoVencimento === "") {
                alert("Por favor, preencha os dados corretamente.");
                return;
            }

            parcelas[index].valor = novoValor;
            parcelas[index].vencimento = novoVencimento;

            salvarNoStorage();
            renderizar();
            fecharModal();
        }

        function formatarMoeda(valor) {
            return valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        function atualizarResumos() {
            const pagas = parcelas.filter(p => p.pago).length;
            const total = parcelas.length;
            const restante = parcelas.filter(p => !p.pago).reduce((acc, curr) => acc + curr.valor, 0);

            document.getElementById('total-pagas').innerText = `${pagas}/${total}`;
            document.getElementById('valor-restante').innerText = formatarMoeda(restante);

            const porcentagem = Math.round((pagas / total) * 100) || 0;
            document.getElementById('barra-progresso').style.width = `${porcentagem}%`;
            document.getElementById('texto-progresso').innerText = `${porcentagem}% concluído`;
        }

        function renderizar() {
            const container = document.getElementById('lista-parcelas');
            container.innerHTML = '';

            parcelas.forEach(p => {
                const card = document.createElement('div');
                card.className = `glass-card p-4 rounded-2xl flex items-center justify-between transition-all duration-300 border-l-4 ${
                    p.pago ? 'border-l-emerald-500 opacity-75' : 'border-l-indigo-500/40 hover:border-l-indigo-400'
                }`;

                card.innerHTML = `
                    <div class="flex items-center gap-4 flex-1 cursor-pointer" onclick="abrirModal(${p.numero})">
                        <div class="w-10 h-10 shrink-0 rounded-xl flex items-center justify-center font-bold text-sm select-none ${
                            p.pago ? 'bg-emerald-500/10 text-emerald-400' : 'bg-indigo-500/10 text-indigo-400'
                        }">
                            ${p.numero.toString().padStart(2, '0')}
                        </div>
                        
                        <div class="flex-1 min-w-0 space-y-1">
                            <span class="font-bold text-base sm:text-lg text-slate-100 block">${formatarMoeda(p.valor)}</span>
                            
                            <div class="space-y-0.5 text-xs text-slate-400">
                                <p class="flex items-center gap-1.5">
                                    <i data-lucide="calendar" class="w-3.5 h-3.5 shrink-0 text-slate-500"></i> 
                                    Vence em: <span class="font-medium text-slate-300">${p.vencimento}</span>
                                </p>
                                ${p.pago && p.dataPagamento ? `
                                <p class="flex items-center gap-1.5 text-emerald-400 bg-emerald-500/5 py-0.5 px-2 rounded-md w-max border border-emerald-500/10 mt-1">
                                    <i data-lucide="calendar-check" class="w-3.5 h-3.5 shrink-0 text-emerald-400"></i> 
                                    <span>Pago em: <span class="font-semibold">${p.dataPagamento}</span></span>
                                </p>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                    
                    <div class="ml-2 shrink-0">
                        <button onclick="alternarStatus(${p.numero}, event)" class="cursor-pointer px-3 sm:px-4 py-2 rounded-xl text-xs font-semibold tracking-wide transition-all duration-200 shadow-sm flex items-center gap-1.5 ${
                            p.pago 
                            ? 'bg-emerald-500/20 text-emerald-400 hover:bg-emerald-500/30 border border-emerald-500/30' 
                            : 'bg-slate-800 text-slate-300 hover:bg-indigo-600 hover:text-white border border-slate-700/80 hover:border-indigo-500'
                        }">
                            <i data-lucide="${p.pago ? 'check-square' : 'square'}" class="w-4 h-4"></i>
                            <span>${p.pago ? 'Pago' : 'Marcar'}</span>
                        </button>
                    </div>
                `;

                container.appendChild(card);
            });

            atualizarResumos();
            lucide.createIcons();
        }

        function resetarDados() {
            if (confirm("Tem certeza que deseja resetar o status de todas as parcelas para 'Pendente'?")) {
                parcelas = parcelasIniciais.map(p => ({ ...p, pago: false, dataPagamento: null }));
                salvarNoStorage();
                renderizar();
            }
        }

        renderizar();
    </script>
</body>
</html>
